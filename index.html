<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friday Arcade OS (Local + Cloudflare Worker Sync)</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f1a;
    color: white;
    overflow-x: hidden;
  }

  h1 {
    text-align: center;
    padding: 20px;
  }

  #controls {
    text-align: center;
    padding: 10px;
  }

  input, button {
    margin: 5px;
    padding: 8px;
    border-radius: 8px;
    border: none;
  }

  button {
    cursor: pointer;
  }

  #gameContainer {
    display: flex;
    flex-direction: column;
    gap: 30px;
    padding: 20px;
  }

  .game {
    background: #1a1a2e;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
  }

  .game iframe {
    width: 100%;
    height: 400px;
    border: none;
  }

  .title {
    padding: 10px;
    font-weight: bold;
  }

  #loader {
    text-align: center;
    padding: 20px;
    opacity: 0.7;
  }

  .box {
    background:#111;
    padding:10px;
    margin:10px;
    border-radius:10px;
  }
</style>
</head>
<body>

<h1>🎮 Friday Arcade OS (Worker Sync Mode)</h1>

<div id="controls">
  <div class="box">
    <p>📁 Load your games folder:</p>
    <input type="file" id="folderInput" webkitdirectory multiple>
  </div>

  <div class="box">
    <p>☁️ Cloudflare Worker Sync</p>
    <input id="workerUrl" value="https://fuck.tflanigan.workers.dev" placeholder="Worker URL (https://your-worker.workers.dev)">
    <input id="repoUser" placeholder="GitHub username">
    <input id="repoName" placeholder="repo name">
    <button onclick="uploadToWorker()">Sync ALL files</button>
  </div>
</div>

<div id="gameContainer"></div>
<div id="loader">Waiting for folder...</div>

<script>
const container = document.getElementById("gameContainer");
const loader = document.getElementById("loader");

let games = [];
let filesStore = [];
let index = 0;
const batchSize = 2;

function createGame(name, url) {
  const div = document.createElement("div");
  div.className = "game";

  div.innerHTML = `
    <div class="title">${name}</div>
    <iframe src="${url}"></iframe>
  `;

  return div;
}

function loadGames() {
  for (let i = 0; i < batchSize && index < games.length; i++, index++) {
    container.appendChild(createGame(games[index].name, games[index].url));
  }

  if (index >= games.length) {
    loader.innerText = "All games loaded 🎉";
  }
}

window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    loadGames();
  }
});

// 📁 Load folder
const input = document.getElementById("folderInput");

input.addEventListener("change", (event) => {
  const files = Array.from(event.target.files);

  filesStore = files;

  games = files
    .filter(f => f.name.endsWith(".html"))
    .map(f => ({
      name: f.name,
      url: URL.createObjectURL(f)
    }));

  container.innerHTML = "";
  index = 0;

  if (games.length === 0) {
    loader.innerText = "No HTML games found 😢";
    return;
  }

  loader.innerText = "Loading games...";
  loadGames();
});

// ☁️ Sync via Cloudflare Worker
async function uploadToWorker() {
  const workerUrl = document.getElementById("workerUrl").value;
  const repoUser = document.getElementById("repoUser").value;
  const repoName = document.getElementById("repoName").value;

  if (!workerUrl || !repoUser || !repoName) {
    alert("Missing worker or repo info");
    return;
  }

  loader.innerText = "Syncing via worker...";

  const payloadFiles = [];

  for (let file of filesStore) {
    const content = await file.text();
    const path = file.webkitRelativePath || file.name;

    payloadFiles.push({
      path,
      content
    });
  }

  const res = await fetch(workerUrl + "/sync", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      repoUser,
      repoName,
      files: payloadFiles
    })
  });

  if (res.ok) {
    loader.innerText = "Sync complete 🎉";
  } else {
    loader.innerText = "Sync failed ❌";
  }
}

</script>

</body>
</html>
